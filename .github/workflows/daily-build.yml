name: Daily Content Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Allow the workflow to push generated content back to the repo.
permissions:
  contents: write

# Prevent overlapping runs from racing on the same branch.
concurrency:
  group: daily-content-update
  cancel-in-progress: false

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch data sources
        run: npx tsx scripts/fetch-all.ts

      - name: Generate articles
        run: npx tsx scripts/generate-articles.ts

      - name: Verify build succeeds
        run: npx next build

      - name: Commit and push updated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content data public/sitemap*.xml public/robots.txt
          if git diff --staged --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore: automated daily content update [skip ci]"
            git push
          fi
